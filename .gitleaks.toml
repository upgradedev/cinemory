# Gitleaks configuration for Cinemory.
# Full default rule set retained (the whole tree is scanned, including tests).
# The repo contains NO real credentials: it is offline-by-default and live creds
# come only from the environment at runtime. The single synthetic test fixture
# that trips the generic-api-key heuristic is suppressed inline with a
# `# gitleaks:allow` comment, so no source path is broadly excluded.

[extend]
useDefault = true

[allowlist]
description = "Credential-free example env only"
paths = [
    '''\.env\.example''',      # placeholder / empty values only
]
