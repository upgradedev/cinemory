name: Firebase Hosting Deploy

# Builds the React client and deploys the Firebase Hosting mirror
# (upgradegr-cinemory.web.app) entirely in CI — no local `npm run build`.
# Cloud Run (run.app) is deployed separately via Cloud Build and is canonical;
# this keeps the mirror in sync from the cloud.
#
# One-time setup already done: a `firebase-deployer` service account
# (roles/firebasehosting.admin + run.viewer + serviceusage.serviceUsageConsumer
# on upgradegr-cinemory) whose JSON key is stored as the repo secret
# FIREBASE_SERVICE_ACCOUNT.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build client
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: upgradegr-cinemory
