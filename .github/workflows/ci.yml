name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. Secret scan (fail-fast, before anything is built) ────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks detect (v8.18.4)
        run: |
          VER=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --verbose

  # ── 2. Python: lint -> unit -> integration -> e2e -> dependency audit ───────
  python:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Unit tests
        run: pytest tests/unit -v
      - name: Integration tests
        run: pytest tests/integration -v
      - name: E2E tests
        run: pytest tests/e2e -v
      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt --strict

  # ── 3. Web: typecheck + dependency audit ────────────────────────────────────
  web:
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Dependency audit (npm)
        run: npm audit --audit-level=high

  # ── 4. CodeQL SAST (python + javascript/typescript) ─────────────────────────
  codeql:
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
