name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. Secret scan (fail-fast, before anything is built) ────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks detect (v8.18.4)
        run: |
          VER=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --no-banner --redact --verbose

  # ── 2. Python: lint -> unit -> integration -> e2e -> dependency audit ───────
  python:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Lint (ruff)
        run: ruff check src tests scripts
      # Coverage accumulates across all three tiers (--cov-append); the gate is
      # enforced once on the combined total at the last tier. Measured ~97%
      # (982 statements) — the 90% floor leaves comfortable headroom.
      - name: Unit tests (coverage)
        run: pytest tests/unit -v --cov=src --cov-report=
      - name: Integration tests (coverage)
        run: pytest tests/integration -v --cov=src --cov-append --cov-report=
      - name: E2E tests + coverage gate (combined >= 90%)
        run: pytest tests/e2e -v --cov=src --cov-append --cov-report=term-missing --cov-fail-under=90
      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt --strict

  # ── 2b. Readiness gate: machine-checkable submission completeness ───────────
  #  Encodes the four Backblaze-challenge criteria plus Cinemory's own fifth
  #  (Application Security) as REAL evidence checks (drives the API/pipeline/B2
  #  adapter/Genblaze SDK, not file-existence). Fails when the automatable
  #  completeness drops below 95%; archives readiness.json.
  readiness:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Readiness gate (>= 95% automatable)
        run: python scripts/readiness.py --min 95
      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readiness-report
          path: readiness.json

  # ── 2c. Pen-test: application-security suite + SCA/CVE gate ──────────────────
  #  Real app-security assertions driving the FastAPI app / pipeline / adapters
  #  (tests/security): authZ+abuse, injection/path-traversal, provenance
  #  integrity, sensitive-data exposure, SSRF/upload magic-byte validation. Plus
  #  the software-composition (SCA) gate: pip-audit (python) + npm audit (both
  #  node clients). Fully offline — no credentials, no network.
  pen-test:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Pen-test suite (tests/security)
        run: pytest tests/security -v
      - name: SCA/CVE gate — pip-audit (runtime deps)
        run: pip-audit -r requirements.txt --strict
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: SCA/CVE gate — npm audit (frontend, shipped deps)
        working-directory: frontend
        # Gate the shipped dependency tree. --omit=dev excludes the Vite/Vitest
        # build+test toolchain (dev-server-only advisories that never reach the
        # deployed static bundle); the runtime deps must be clean at high+.
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
      - name: SCA/CVE gate — npm audit (web client)
        working-directory: web
        run: |
          npm install
          npm audit --audit-level=high

  # ── 3. Web: typecheck + dependency audit ────────────────────────────────────
  web:
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Dependency audit (npm)
        run: npm audit --audit-level=high

  # ── 4. Frontend: React + Vite (typecheck + build + component tests) ─────────
  frontend:
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      # Runs the same vitest suite AND collects V8 coverage. Gates on app-source
      # coverage (lines/statements/functions >= 90, branches >= 85; measured
      # ~98.5% lines / 100% functions / ~90% branches). Thresholds live in
      # vite.config.ts (the single source of truth). Fails the build if breached.
      - name: Unit + component tests + coverage (vitest)
        run: npm run test:coverage
      - name: Build
        run: npm run build

  # ── 4b. E2E: real-browser journey + responsive + tap-targets + axe a11y ─────
  #  Playwright drives the BUILT app in headless Chromium (vite preview) with
  #  the API mocked at the network boundary — deterministic, no backend. Guards
  #  what jsdom cannot see: every wizard step actually mounts and its animated
  #  panel reaches opacity:1 (the AnimatePresence dead-end), no horizontal
  #  overflow and >=44px tap targets at 375/768/1280, zero serious/critical axe
  #  violations on the landing + each step, and a visible keyboard focus ring.
  e2e:
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium chromium-headless-shell
      - name: E2E (journey + responsive + a11y)
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  # ── 4c. Lighthouse (mobile): accessibility + best-practices budget ──────────
  #  Runs Lighthouse (mobile emulation) against the built app, served with the
  #  two API routes mocked so a spurious 404 never dings best-practices. Gates
  #  accessibility >= 0.95 and best-practices >= 0.9; performance is a warn-only
  #  budget (kept off the hard gate to avoid runner-speed flakiness).
  lighthouse:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Lighthouse CI (a11y >= 0.95 + best-practices >= 0.9)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./frontend/lighthouserc.json
          uploadArtifacts: true

  # ── 4d. Demo video: A/V + caption-sync + segment-order gate ─────────────────
  #  ffprobes the committed demo mp4 and cross-checks it against the beat script
  #  (scripts/check_video.py): under the 180s hard cap, H.264/yuv420p 1280x720
  #  ~30fps with a single AAC track, and SRT cues matching the beats one-for-one
  #  in order, timing and text — so a desynced or over-length video fails the
  #  build. Dependency-light: ffprobe + the standard library only.
  demo-video:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg (provides ffprobe)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Demo video sync gate
        run: python scripts/check_video.py

  # ── 5. CodeQL SAST (python + javascript/typescript) ─────────────────────────
  codeql:
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
