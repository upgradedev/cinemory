# Cloud Build — build the Cinemory container and push it to Artifact Registry.
# Cloud-first: the image is built by Cloud Build (no local Docker).
#
# Invoked by deploy/deploy-cloudrun.sh, or directly:
#   gcloud builds submit --config deploy/cloudbuild.yaml \
#     --substitutions=_IMAGE=europe-west1-docker.pkg.dev/PROJECT/REPO/cinemory:TAG
substitutions:
  _IMAGE: "europe-west1-docker.pkg.dev/upgradegr-cinemory/cinemory/cinemory:latest"

steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE}", "-f", "Dockerfile", "."]

images:
  - "${_IMAGE}"

options:
  # Required when the build has no default logs bucket (default Cloud Build SA).
  logging: CLOUD_LOGGING_ONLY
